name: Generate Docs and Deploy to GitHub Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true
jobs:
  deploy:
    env:
      CONFIG_FILE: docs/docs/mkdocs.yml
      REQUIREMENTS: docs/docs/requirements.txt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          cache: pip
          cache-dependency-path: ${{ env.REQUIREMENTS }}
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install -r "$REQUIREMENTS"
      - run: mkdocs gh-deploy --force --config-file "$CONFIG_FILE"
